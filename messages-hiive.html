<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages – Hiive</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="theme-dark">

<div class="hiive-messages">

<!-- LEFT : conversations -->
<aside class="hiive-chat-list">

<div class="chat-header">
<h2>Messages</h2>
<input type="text" placeholder="Rechercher..." />
</div>

<div class="chat-list-title">Messages récents</div>

<div class="chat-item unread active"
data-user="emma"
data-name="Emma Martin"
data-avatar="https://randomuser.me/api/portraits/women/44.jpg">
<img src="https://randomuser.me/api/portraits/women/44.jpg" alt="Emma Martin" />
<div>
<strong>Emma Martin</strong>
<p>On avance sur le projet ?</p>
</div>
<span class="badge">2</span>
</div>

<div class="chat-item read"
data-user="hakim"
data-name="Hakim Ajigua"
data-avatar="https://randomuser.me/api/portraits/men/32.jpg">
<img src="https://randomuser.me/api/portraits/men/32.jpg" alt="Hakim Ajigua" />
<div>
<strong>Hakim Ajigua</strong>
<p>J’ai une idée audio 🔥</p>
</div>
<span class="chat-status-label">Lu</span>
</div>

</aside>

<!-- RIGHT : chat -->
<section class="hiive-chat">

<div class="chat-top">
<img id="chat-avatar" src="https://randomuser.me/api/portraits/women/44.jpg" alt="Emma Martin" />
<strong id="chat-name">Emma Martin</strong>
</div>

<div class="chat-messages">

<div class="chat-conversation" id="emma">
<div class="msg other">Salut 👋</div>
<div class="msg me">Hey ! Tu vas bien ?</div>
<div class="msg other">On avance sur le projet ?</div>
</div>

<div class="chat-conversation" id="hakim" style="display:none;">
<div class="msg other">J’ai une idée audio 🔥</div>
<div class="msg me">Dis-moi, je t’écoute</div>
</div>

</div>

<div class="chat-input">
<input type="text" placeholder="Écrire un message..." />
<button type="button" onclick="sendMessage()">Envoyer</button>
</div>

</section>

</div>

<script>
const items = document.querySelectorAll('.chat-item');

items.forEach(item => {
item.addEventListener('click', () => {
items.forEach(i => i.classList.remove('active'));
item.classList.add('active');

const user = item.dataset.user;

document.querySelectorAll('.chat-conversation').forEach(conv => {
conv.style.display = 'none';
});

const target = document.getElementById(user);
if (target) target.style.display = 'block';

const chatName = document.getElementById('chat-name');
const chatAvatar = document.getElementById('chat-avatar');

if (chatName) chatName.textContent = item.dataset.name;
if (chatAvatar) {
chatAvatar.src = item.dataset.avatar;
chatAvatar.alt = item.dataset.name;
}

item.classList.remove('unread');
item.classList.add('read');

const badge = item.querySelector('.badge');
if (badge) badge.remove();

let status = item.querySelector('.chat-status-label');
if (!status) {
status = document.createElement('span');
status.className = 'chat-status-label';
status.textContent = 'Lu';
item.appendChild(status);
}
});
});

function sendMessage() {
const input = document.querySelector('.chat-input input');
const activeConversation = document.querySelector('.chat-conversation[style*="block"], .chat-conversation:not([style*="display:none"])');

if (!input || !activeConversation) return;

const text = input.value.trim();
if (!text) return;

const msg = document.createElement('div');
msg.className = 'msg me';
msg.textContent = text;

activeConversation.appendChild(msg);
input.value = '';

const messagesContainer = document.querySelector('.chat-messages');
if (messagesContainer) {
messagesContainer.scrollTop = messagesContainer.scrollHeight;
}
}
</script>

</body>
</html>
