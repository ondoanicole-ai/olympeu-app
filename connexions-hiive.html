<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hiive - Connexions</title>

<style>

/* GLOBAL */
body{
margin:0;
font-family:Arial;
background:#0b0f1a;
color:#fff;
}

/* CONTAINER */
.connectionsPage{
max-width:900px;
margin:auto;
padding:20px;
}

/* TOP BAR */
.connectionsTop{
display:flex;
gap:10px;
margin-bottom:20px;
}

.connectionsTop input{
flex:1;
padding:12px;
border-radius:12px;
border:none;
background:rgba(255,255,255,0.05);
color:#fff;
}

.inviteBtn{
background:#3b82f6;
border:none;
padding:12px 16px;
border-radius:10px;
color:#fff;
font-weight:600;
cursor:pointer;
}

/* TABS */
.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
}

.tab{
background:rgba(255,255,255,0.05);
border:none;
padding:10px 16px;
border-radius:20px;
color:#fff;
cursor:pointer;
}

.tab.active{
background:#3b82f6;
}

/* USER CARD */
.userCard{
display:flex;
align-items:center;
justify-content:space-between;
padding:14px;
border-radius:14px;
background:rgba(255,255,255,0.03);
margin-bottom:10px;
transition:0.2s;
}

.userCard:hover{
background:rgba(255,255,255,0.06);
}

.userInfo{
display:flex;
align-items:center;
gap:12px;
}

.userInfo img{
width:45px;
height:45px;
border-radius:50%;
}

.userInfo strong{
display:block;
}

.userInfo span{
font-size:13px;
color:rgba(255,255,255,0.6);
}

/* BUTTONS */
.actions{
display:flex;
gap:8px;
}

.btn{
border:none;
padding:8px 12px;
border-radius:10px;
cursor:pointer;
font-size:13px;
}

.follow{
background:rgba(255,255,255,0.1);
color:#fff;
}

.connect{
background:#3b82f6;
color:#fff;
}

.connected{
background:rgba(0,255,150,0.2);
color:#00ffa6;
}

.accept{
background:#22c55e;
color:#fff;
}

</style>
</head>

<body>

<div class="connectionsPage">

<!-- TOP -->
<div class="connectionsTop">
<input type="text" id="searchUser" placeholder="Rechercher...">
<button class="inviteBtn">Inviter</button>
</div>

<!-- TABS -->
<div class="tabs">
<button class="tab active" onclick="switchTab('connections', this)">Connexions</button>
<button class="tab" onclick="switchTab('suggestions', this)">Suggestions</button>
<button class="tab" onclick="switchTab('requests', this)">Invitations</button>
</div>

<!-- LIST -->
<div id="listContainer"></div>

</div>

<script>

/* USERS DEMO */
const users = [
{id:1,name:"Emma Martin",handle:"@emma",status:"connected"},
{id:2,name:"Hakim Ajiqua",handle:"@hakim",status:"follow"},
{id:3,name:"Nina Learn",handle:"@nina",status:"connect"},
{id:4,name:"Max Digital",handle:"@max",status:"request"},
{id:5,name:"Claire Zen",handle:"@claire",status:"follow"},
{id:6,name:"Jean Tech",handle:"@jean",status:"connect"},
];

let currentTab = "connections";

/* RENDER */
function renderUsers(){

const search = document.getElementById("searchUser").value.toLowerCase();

let filtered = users.filter(u=>{

if(search && !u.name.toLowerCase().includes(search)) return false;

if(currentTab === "connections") return u.status === "connected";
if(currentTab === "suggestions") return u.status === "follow" || u.status === "connect";
if(currentTab === "requests") return u.status === "request";

});

document.getElementById("listContainer").innerHTML = filtered.map(u=>`

<div class="userCard">

<div class="userInfo">
<img src="https://randomuser.me/api/portraits/men/${u.id+10}.jpg">
<div>
<strong>${u.name}</strong>
<span>${u.handle}</span>
</div>
</div>

<div class="actions">
${renderButtons(u)}
</div>

</div>

`).join('');

}

/* BUTTON LOGIC */
function renderButtons(u){

if(u.status === "connected"){
return `<button class="btn connected">Connecté</button>`;
}

if(u.status === "follow"){
return `<button class="btn follow" onclick="follow(${u.id})">Suivre</button>`;
}

if(u.status === "connect"){
return `<button class="btn connect" onclick="connect(${u.id})">Se connecter</button>`;
}

if(u.status === "request"){
return `<button class="btn accept" onclick="accept(${u.id})">Accepter</button>`;
}

}

/* ACTIONS */
function follow(id){
alert("Suivi !");
}

function connect(id){
const u = users.find(x=>x.id===id);
u.status = "request";
renderUsers();
}

function accept(id){
const u = users.find(x=>x.id===id);
u.status = "connected";
renderUsers();
}

/* TAB SWITCH */
function switchTab(tab, el){
currentTab = tab;

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
el.classList.add("active");

renderUsers();
}

/* SEARCH */
document.getElementById("searchUser").addEventListener("input", renderUsers);

/* INIT */
renderUsers();

</script>

</body>
</html>
