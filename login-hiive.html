<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hiive — Connexion</title>

<style>

/* ===== GLOBAL ===== */

body{
margin:0;
font-family: 'Inter', sans-serif;
background: radial-gradient(circle at top, #0a1628, #050a14);
color:#fff;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

/* ===== CARD ===== */

.loginCard{
width:360px;
padding:30px;
border-radius:20px;
background: rgba(255,255,255,0.03);
backdrop-filter: blur(12px);
border:1px solid rgba(255,255,255,0.08);
box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

/* ===== HEADER ===== */

.logo{
font-size:28px;
font-weight:800;
margin-bottom:5px;
}

.subtitle{
color:rgba(255,255,255,0.6);
margin-bottom:25px;
}

/* ===== INPUT ===== */

.inputGroup{
margin-bottom:15px;
}

.inputGroup input{
width:100%;
padding:12px 14px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.08);
background:rgba(255,255,255,0.04);
color:#fff;
outline:none;
}

.inputGroup input:focus{
border-color:#4facfe;
box-shadow:0 0 0 2px rgba(79,172,254,0.2);
}

/* ===== BUTTON ===== */

.loginBtn{
width:100%;
padding:12px;
border:none;
border-radius:12px;
font-weight:700;
color:#fff;
background:linear-gradient(135deg,#4facfe,#00f2fe);
cursor:pointer;
margin-top:10px;
box-shadow:0 0 15px rgba(79,172,254,0.3);
}

.loginBtn:hover{
transform:translateY(-1px);
}

/* ===== FOOTER ===== */

.footer{
text-align:center;
margin-top:20px;
font-size:14px;
color:rgba(255,255,255,0.6);
}

.footer a{
color:#4facfe;
text-decoration:none;
font-weight:600;
}

/* ===== ERROR ===== */

.error{
color:#ff4d6d;
font-size:13px;
margin-top:8px;
display:none;
}

</style>
</head>

<body>

<div class="loginCard">

<div class="logo">Hiive</div>
<div class="subtitle">Connexion à votre compte</div>

<div class="inputGroup">
<input type="email" id="email" placeholder="Email">
</div>

<div class="inputGroup">
<input type="password" id="password" placeholder="Mot de passe">
</div>

<button class="loginBtn" onclick="login()">Se connecter</button>

<div class="error" id="errorMsg">Identifiants incorrects</div>

<div class="footer">
Pas encore de compte ? <a href="#">Créer un compte</a>
</div>

</div>

<script>

function login(){
const email = document.getElementById('email').value;
const password = document.getElementById('password').value;
const error = document.getElementById('errorMsg');

if(email === "test@hiive.com" && password === "1234"){
alert("Connexion réussie !");
// futur : redirection
// window.location.href = "videos-hiive.html";
}else{
error.style.display = "block";
}
}

</script>

</body>
</html>
